apiVersion: v1
kind: Service
metadata:
  name: jupyter-nodeport
  namespace: jupyter-ml
  labels:
    app: jupyter
    project: claude-ml-project2
spec:
  type: NodePort
  selector:
    app: jupyter
  ports:
  - name: notebook
    port: 8888
    targetPort: 8888
    nodePort: 30088   # Access via http://localhost:30088
    protocol: TCP
